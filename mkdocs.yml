site_name: kuberay-sdk
site_description: A user-friendly Python SDK for managing Ray clusters, jobs, and services on Kubernetes and OpenShift via KubeRay.
site_url: https://szaher.github.io/kuberay-sdk/
repo_url: https://github.com/szaher/kuberay-sdk
repo_name: szaher/kuberay-sdk

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - gen-files:
      scripts:
        - scripts/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            show_signature_annotations: true
            separate_signature: true
            signature_crossrefs: true
            merge_init_into_class: true
            show_if_no_docstring: false
            filters:
              - "!^_"
  - mkdocs-jupyter:
      include_source: true
      execute: false

extra:
  version:
    provider: mike

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - Home: index.md
  - User Guide:
      - Getting Started:
          - Installation: user-guide/getting-started/installation.md
          - Quick Start: user-guide/getting-started/quick-start.md
      - Cluster Management: user-guide/cluster-management.md
      - Job Submission: user-guide/job-submission.md
      - Ray Serve: user-guide/ray-serve.md
      - Storage & Runtime Env: user-guide/storage-runtime-env.md
      - OpenShift Integration: user-guide/openshift.md
      - Experiment Tracking: user-guide/experiment-tracking.md
      - Async Usage: user-guide/async-usage.md
      - Error Handling: user-guide/error-handling.md
      - Configuration: user-guide/configuration.md
  - Developer Guide:
      - Architecture: developer-guide/architecture.md
      - Development Setup: developer-guide/development-setup.md
      - Testing: developer-guide/testing.md
      - Code Style: developer-guide/code-style.md
      - Contributing: developer-guide/contributing.md
  - API Reference: reference/
  - Examples:
      - examples/index.md
      - Cluster Basics: examples/cluster-basics.md
      - Job Submission: examples/job-submission.md
      - Advanced Config: examples/advanced-config.md
      - Async Client: examples/async-client.md
      - Ray Serve Deployment: examples/ray-serve-deployment.md
      - OpenShift Features: examples/openshift-features.md
      - MNIST Training: examples/mnist_training.ipynb
  - What's New: changelog.md
